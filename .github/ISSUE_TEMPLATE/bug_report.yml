name: Bug report
description: Create a report to help us improve the plugin
title: "[BUG] "
labels: bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue for LST Video Story!
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      value: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: WordPress & WooCommerce versions
      description: Which versions are you using?
      placeholder: "e.g., WP 6.4, Woo 8.5"
    validations:
      required: true
